name: Check for AirConnect Updates

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch latest AirConnect release info
        id: fetch
        run: |
          # Fetch release JSON
          RELEASE_JSON=$(curl -sL -H "User-Agent: check-update-action" "https://api.github.com/repos/philippe44/AirConnect/releases/latest")
          
          # Extract version
          VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          
          # Find the ZIP asset (e.g., AirConnect-1.9.3.zip)
          # This regex looks for 'AirConnect-' followed by digits and dots, ending in '.zip'
          NEW_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("AirConnect-[0-9.]+zip")) | .browser_download_url' | head -1)
          
          if [ -z "$NEW_URL" ] || [ "$NEW_URL" == "null" ]; then
            echo "Error: Could not find the AirConnect ZIP asset."
            exit 1
          fi
          
          echo "new_url=$NEW_URL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found latest version: $VERSION"

      - name: Check if update is needed
        id: check
        run: |
          if [ ! -f AIRCAST_URL ]; then touch AIRCAST_URL; fi
          CURRENT_URL=$(cat AIRCAST_URL | tr -d '\n\r')
          NEW_URL="${{ steps.fetch.outputs.new_url }}"
          
          if [ "$CURRENT_URL" = "$NEW_URL" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update AIRCAST_URL file
        if: steps.check.outputs.needs_update == 'true'
        run: echo "${{ steps.fetch.outputs.new_url }}" > AIRCAST_URL

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update AirConnect to ${{ steps.fetch.outputs.version }}"
          title: "Update AirConnect to ${{ steps.fetch.outputs.version }}"
          body: "Automated update to the latest AirConnect ZIP: ${{ steps.fetch.outputs.new_url }}"
          branch: update-airconnect-${{ steps.fetch.outputs.version }}
          delete-branch: true
          assignees: "andkrause"